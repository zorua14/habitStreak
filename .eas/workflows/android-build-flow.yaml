# .eas/workflows/android-build.yml
# Triggered on every push to main — runs lint first, then builds Android (production profile)

name: Android Build (main)

on:
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint
    steps:
      - name: Checkout
        uses: eas/checkout

      - name: Install dependencies
        uses: eas/install_node_modules

      - name: Run lint
        run: npx expo lint
        # If you use a custom script, replace with: npm run lint

  build_android:
    name: Build Android
    needs: [lint]           # only runs if lint passes
    type: build
    params:
      platform: android
      profile: production   # maps to the "production" profile in your eas.json
                            # which already sets autoIncrement, channel, and buildType: apk
